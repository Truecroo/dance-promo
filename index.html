<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dance Promo</title>
  <link rel="stylesheet" href="css/style.css?v=6" />
</head>
<body>
  <div id="energy"></div> <!-- реактивный фон танцпола -->

  <div id="game">
    <!-- Прогресс трека -->
    <div id="progress"><span id="progressBar"></span></div>

    <!-- HUD -->
    <header id="hud">
      <div id="score"><span class="label">очки</span><b id="scoreVal">0</b></div>
      <div id="best"><span class="label">макс. комбо</span><b id="bestVal">0</b></div>
    </header>

    <!-- Игровое поле -->
    <div id="stage">
      <canvas id="gameCanvas" width="480" height="480"></canvas>
      <div id="floor"></div>
      <div id="dancer" data-mood="idle"><img id="dancerImg" alt="танцор" /></div>
      <div id="comboBox" class="hidden">
        <b id="comboCount">0</b><span>combo</span>
      </div>
      <div id="judgment"></div>
      <div id="floaters"></div>
    </div>

    <!-- Тач-кнопки (4 направления) -->
    <div id="pad">
      <button class="dirBtn" data-dir="up"    aria-label="вверх">▲</button>
      <div class="padRow">
        <button class="dirBtn" data-dir="left"  aria-label="влево">◀</button>
        <button class="dirBtn" data-dir="down"  aria-label="вниз">▼</button>
        <button class="dirBtn" data-dir="right" aria-label="вправо">▶</button>
      </div>
    </div>

    <!-- Модалки / сюжет -->
    <div id="overlay">
      <div class="modal" id="startModal">
        <h1>Танцпол открыт</h1>
        <p class="story">Наш герой стоит у края танцпола. Толпа ждёт.
          Покажи ему ритм — лови стрелки, что летят к центру, и жми в нужный
          момент. Чем длиннее комбо, тем круче он танцует.</p>
        <button id="startBtn" class="bigBtn">Начать</button>
      </div>

      <div class="modal hidden" id="endModal">
        <h1 id="endTitle">Финал</h1>
        <p class="story" id="endStory"></p>
        <div id="finalScore"></div>
        <button id="againBtn" class="bigBtn">Ещё раз</button>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=6"></script>
  <script src="js/game.js?v=6"></script>
</body>
</html>
