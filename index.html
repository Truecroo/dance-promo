<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dance Promo</title>
  <link rel="stylesheet" href="css/style.css?v=11" />
</head>
<body>
  <div id="energy"></div> <!-- реактивный фон танцпола -->

  <div id="game">
    <!-- Прогресс трека -->
    <div id="progress"><span id="progressBar"></span></div>
    <!-- Энергия -->
    <div id="energy-bar"><span id="energyBar"></span></div>

    <!-- HUD -->
    <header id="hud">
      <div id="score"><span class="label">очки</span><b id="scoreVal">0</b></div>
      <div id="hudControls">
        <button id="soundBtn" class="iconBtn" aria-label="звук">🔊</button>
        <button id="pauseBtn" class="iconBtn" aria-label="пауза">⏸</button>
      </div>
      <div id="best"><span class="label">макс. комбо</span><b id="bestVal">0</b></div>
    </header>

    <!-- Игровое поле -->
    <div id="stage">
      <canvas id="gameCanvas" width="480" height="480"></canvas>
      <div id="floor"></div>
      <div id="dancer" data-mood="idle"><img id="dancerImg" alt="танцор" /></div>
      <div id="comboBox" class="hidden">
        <b id="comboCount">0</b><span>combo</span>
      </div>
      <div id="judgment"></div>
      <div id="floaters"></div>
      <div id="countdown" class="hidden"></div>
    </div>

    <!-- Подсказка-туториал (первая игра) -->
    <div id="tutHint" class="hidden">Жми кнопку той стороны, откуда летит стрелка ↡</div>

    <!-- Тач-кнопки (4 направления) -->
    <div id="pad">
      <button class="dirBtn" data-dir="up"    aria-label="вверх">▲</button>
      <div class="padRow">
        <button class="dirBtn" data-dir="left"  aria-label="влево">◀</button>
        <button class="dirBtn" data-dir="down"  aria-label="вниз">▼</button>
        <button class="dirBtn" data-dir="right" aria-label="вправо">▶</button>
      </div>
    </div>

    <!-- ===== Экраны ===== -->
    <div id="overlay">

      <!-- Интро -->
      <div class="modal" id="screenIntro" data-screen="intro">
        <h1>Танцпол открыт</h1>
        <p class="story">Лови стрелки, что летят к центру, и жми в нужный момент.
          Чем длиннее комбо — тем круче танцует герой. Попади в топ!</p>
        <button id="toEntryBtn" class="bigBtn">Играть</button>
        <button id="toLbBtn" class="ghostBtn">🏆 Таблица лидеров</button>
      </div>

      <!-- Ввод ника + контакта -->
      <div class="modal hidden" id="screenEntry" data-screen="entry">
        <h1>Кто зажигает?</h1>
        <label class="field">
          <span>Ник</span>
          <input id="inputName" type="text" maxlength="16" placeholder="например, NEON" autocomplete="off" />
        </label>
        <label class="field">
          <span>Контакт <i>(email или телефон)</i></span>
          <input id="inputContact" type="text" maxlength="60" placeholder="you@mail.com" autocomplete="off" />
        </label>
        <p class="formError hidden" id="entryError"></p>
        <button id="startGameBtn" class="bigBtn">Поехали</button>
        <button id="entryBackBtn" class="ghostBtn">Назад</button>
      </div>

      <!-- Результат -->
      <div class="modal hidden" id="screenResult" data-screen="result">
        <h1 id="endTitle">Финал</h1>
        <p class="story" id="endStory"></p>
        <div id="resultStats"></div>
        <div id="rankLine"></div>
        <button id="toLbAfterBtn" class="bigBtn">🏆 В таблицу</button>
        <button id="againBtn" class="ghostBtn">Ещё раз</button>
      </div>

      <!-- Лидерборд -->
      <div class="modal hidden" id="screenLeaderboard" data-screen="leaderboard">
        <h1>Таблица лидеров</h1>
        <ol id="lbList" class="lbList"></ol>
        <button id="lbPlayBtn" class="bigBtn">Играть</button>
        <button id="lbResetBtn" class="ghostBtn">Очистить</button>
      </div>

    </div>
  </div>

  <script src="js/config.js?v=10"></script>
  <script src="js/audio.js?v=10"></script>
  <script src="js/leaderboard.js?v=10"></script>
  <script src="js/game.js?v=10"></script>
</body>
</html>
